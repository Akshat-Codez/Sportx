<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPORTX | Authentication</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="auth.css">
</head>
<body>

    <div class="auth-container">
        <div class="glass-card">
            <div class="logo-wrapper">
                <span class="logo-text">S</span>
            </div>
            
            <h2 class="title">SPORTX</h2>
            
            <form id="authForm" class="auth-form">
                <div class="auth-tabs">
                    <!-- FIX #6: Pass event explicitly — implicit global `event` breaks in some browsers -->
                    <button type="button" class="tab-btn active" onclick="switchTab(event, 'signup')">Sign Up</button>
                    <button type="button" class="tab-btn" onclick="switchTab(event, 'signin')">Sign In</button>
                </div>

                <div class="input-group" id="otpGroup" style="display: none;">
                    <input type="text" id="otp" class="input-field" placeholder="Enter OTP sent to your email" maxlength="6">
                </div>
                
                <div class="input-group">
                    <input type="email" id="email" class="input-field" placeholder="Email" required>
                    <input type="password" id="password" class="input-field" placeholder="Password" required>
                    <div id="errorMsg" class="error-msg"></div>
                    <div id="successMsg" class="success-msg"></div>
                </div>
                
                <hr class="divider">
                
                <div class="action-group">
                    <button type="submit" id="submitBtn" class="primary-btn">Create Account</button>
                    
                    <button type="button" class="google-btn">
                        <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google">
                        Continue with Google
                    </button>
                </div>
            </form>
        </div>

        <div class="social-proof">
            <p>Join <span class="highlight">thousands</span> of athletes already using SPORTX.</p>
            <div class="avatars">
                <img src="https://randomuser.me/api/portraits/men/32.jpg" alt="user">
                <!-- FIX #7: typo srcc → src -->
                <img src="https://randomuser.me/api/portraits/women/44.jpg" alt="user">
                <img src="https://randomuser.me/api/portraits/men/54.jpg" alt="user">
                <img src="https://randomuser.me/api/portraits/women/68.jpg" alt="user">
            </div>
        </div>
    </div>

    <script>
        let currentMode  = 'signup';
        let otpSent      = false;
        let pendingToken = null;

        function switchTab(e, mode) {
            currentMode  = mode;
            otpSent      = false;
            pendingToken = null;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            document.getElementById('otpGroup').style.display = 'none';
            document.getElementById('submitBtn').textContent  = mode === 'signup' ? 'Get OTP' : 'Sign In';
            document.getElementById('errorMsg').textContent   = '';
            document.getElementById('successMsg').innerHTML   = '';
        }

        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email     = document.getElementById('email').value.trim();
            const password  = document.getElementById('password').value;
            const errorMsg  = document.getElementById('errorMsg');
            const successMsg= document.getElementById('successMsg');
            const submitBtn = document.getElementById('submitBtn');

            errorMsg.textContent  = '';
            successMsg.innerHTML  = '';
            submitBtn.disabled    = true;
            submitBtn.textContent = 'Please wait…';

            try {
                if (currentMode === 'signin') {
                    const res  = await fetch('/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });
                    const data = await res.json();
                    if (data.success) {
                        localStorage.setItem('sportx_user',  email);
                        localStorage.setItem('sportx_token', data.token);
                        window.location.href = '/';
                    } else {
                        errorMsg.textContent = data.message;
                    }

                } else {
                    if (!otpSent) {
                        // ── Step 1: request OTP ──
                        const res  = await fetch('/api/auth/register', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ email, password, name: email.split('@')[0] })
                        });
                        const data = await res.json();
                        if (data.success) {
                            otpSent      = true;
                            pendingToken = data.pendingToken || null;
                            // Auto-fill the OTP field — server always returns it directly
                            document.getElementById('otpGroup').style.display = 'block';
                            document.getElementById('otp').value = data.otp || '';
                            submitBtn.textContent = 'Verify & Create Account';
                            successMsg.innerHTML  =
                                `<span style="color:#2ed573">OTP ready!</span> ` +
                                `Your code is <strong style="color:#F5A623;font-size:20px;letter-spacing:3px">${data.otp}</strong>` +
                                ` — it's already filled in below. Just click Verify.`;
                        } else {
                            errorMsg.textContent = data.message;
                        }

                    } else {
                        // ── Step 2: verify OTP ──
                        const otp = document.getElementById('otp').value.trim();
                        if (!otp) {
                            errorMsg.textContent  = 'Please enter the OTP.';
                            submitBtn.disabled    = false;
                            submitBtn.textContent = 'Verify & Create Account';
                            return;
                        }
                        const body = { email, otp, pendingToken };
                        const res  = await fetch('/api/auth/verify-otp', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(body)
                        });
                        const data = await res.json();
                        if (data.success) {
                            localStorage.setItem('sportx_user',  email);
                            localStorage.setItem('sportx_token', data.token);
                            window.location.href = '/';
                        } else {
                            errorMsg.textContent = data.message;
                        }
                    }
                }
            } catch (err) {
                errorMsg.textContent = 'Network error. Please try again.';
            } finally {
                submitBtn.disabled = false;
                if (!otpSent && currentMode === 'signup') submitBtn.textContent = 'Get OTP';
                else if (otpSent)                         submitBtn.textContent = 'Verify & Create Account';
                else                                      submitBtn.textContent = 'Sign In';
            }
        });
    </script>
</body>
</html>
