<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPORTX | Authentication</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="auth.css">
</head>
<body>

    <div class="auth-container">
        <!-- Centered glass card -->
        <div class="glass-card">
            <!-- Logo -->
            <div class="logo-wrapper">
                <span class="logo-text">S</span>
            </div>
            
            <!-- Title -->
            <h2 class="title">SPORTX</h2>
            
            <!-- Form -->
            <form id="authForm" class="auth-form">
                <!-- Tabs to switch between Sign In and Sign Up -->
                <div class="auth-tabs">
                    <button type="button" class="tab-btn active" onclick="switchTab('signup')">Sign Up</button>
                    <button type="button" class="tab-btn" onclick="switchTab('signin')">Sign In</button>
                </div>

                <div class="input-group" id="otpGroup" style="display: none;">
                    <input type="text" id="otp" class="input-field" placeholder="Enter OTP (Check Console)">
                </div>

                <div class="input-group" id="signupFields">
                    <input type="text" id="name" class="input-field" placeholder="Full Name" required>
                    <input type="text" id="phone" class="input-field" placeholder="Phone Number">
                    <input type="text" id="address" class="input-field" placeholder="Delivery Address">
                </div>
                
                <div class="input-group">
                    <input type="email" id="email" class="input-field" placeholder="Email" required>
                    <input type="password" id="password" class="input-field" placeholder="Password" required>
                    <div id="errorMsg" class="error-msg"></div>
                    <div id="successMsg" class="success-msg"></div>
                </div>
                
                <hr class="divider">
                
                <div class="action-group">
                    <button type="submit" id="submitBtn" class="primary-btn">Create Account</button>
                    
                    <button type="button" class="google-btn" onclick="alert('Google Sign-in is running in Demo Mode! Please use Email/Password.')">
                        <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google">
                        Continue with Google
                    </button>
                </div>
            </form>
        </div>

        <!-- User count and avatars -->
        <div class="social-proof">
            <p>Join <span class="highlight">thousands</span> of athletes who are already using SPORTX.</p>
            <div class="avatars">
                <img src="https://randomuser.me/api/portraits/men/32.jpg" alt="user">
                <img src="https://randomuser.me/api/portraits/women/44.jpg" alt="user">
                <img src="https://randomuser.me/api/portraits/men/54.jpg" alt="user">
                <img src="https://randomuser.me/api/portraits/women/68.jpg" alt="user">
            </div>
        </div>
    </div>

    <script>
        let currentMode = 'signup';
        let otpSent = false;

        function switchTab(mode) {
            currentMode = mode;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            const submitBtn = document.getElementById('submitBtn');
            const otpGroup = document.getElementById('otpGroup');
            
            if (mode === 'signup') {
                document.getElementById('signupFields').style.display = 'flex';
                document.getElementById('name').setAttribute('required', 'true');
                submitBtn.textContent = otpSent ? 'Verify OTP & Register' : 'Send OTP to Email';
                if (otpSent) otpGroup.style.display = 'block';
                else otpGroup.style.display = 'none';
            } else {
                document.getElementById('signupFields').style.display = 'none';
                document.getElementById('name').removeAttribute('required');
                submitBtn.textContent = 'Sign in';
                otpGroup.style.display = 'none';
            }
            
            document.getElementById('errorMsg').textContent = '';
            document.getElementById('successMsg').textContent = '';
        }

        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            
            errorMsg.textContent = '';
            successMsg.textContent = '';

            if (currentMode === 'signin') {
                // Handle Login
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                
                if (data.success) {
                    localStorage.setItem('sportx_user', JSON.stringify({ email, name: data.name, phone: data.phone, address: data.address }));
                    localStorage.setItem('sportx_token', data.token);
                    window.location.href = '/';
                } else {
                    errorMsg.textContent = data.message;
                    alert(data.message);
                }
            } else {
                // Handle Signup (OTP flow)
                if (!otpSent) {
                    // Send OTP
                    const name = document.getElementById('name').value;
                    const phone = document.getElementById('phone').value;
                    const address = document.getElementById('address').value;
                    const res = await fetch('/api/auth/register', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ email, password, name, phone, address })
                    });
                    const data = await res.json();
                    
                    if (data.success) {
                        otpSent = true;
                        document.getElementById('otpGroup').style.display = 'block';
                        document.getElementById('submitBtn').textContent = 'Verify OTP & Register';
                        successMsg.textContent = data.message;
                    } else {
                        errorMsg.textContent = data.message;
                        alert(data.message);
                    }
                } else {
                    // Verify OTP & Register
                    const otp = document.getElementById('otp').value;
                    const res = await fetch('/api/auth/verify-otp', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ email, otp })
                    });
                    const data = await res.json();
                    
                    if (data.success) {
                        localStorage.setItem('sportx_user', JSON.stringify({ email, name: data.name, phone: data.phone, address: data.address }));
                        localStorage.setItem('sportx_token', data.token);
                        window.location.href = '/';
                    } else {
                        errorMsg.textContent = data.message;
                        alert(data.message);
                    }
                }
            }
        });
    </script>
</body>
</html>
