<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPORTX | Authentication</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="auth.css">
</head>
<body>

    <div class="auth-container">
        <div class="glass-card">
            <div class="logo-wrapper">
                <span class="logo-text">S</span>
            </div>
            
            <h2 class="title">SPORTX</h2>
            
            <form id="authForm" class="auth-form">
                <div class="auth-tabs">
                    <!-- FIX #6: Pass event explicitly — implicit global `event` breaks in some browsers -->
                    <button type="button" class="tab-btn active" onclick="switchTab(event, 'signup')">Sign Up</button>
                    <button type="button" class="tab-btn" onclick="switchTab(event, 'signin')">Sign In</button>
                </div>

                <div class="input-group" id="otpGroup" style="display: none;">
                    <input type="text" id="otp" class="input-field" placeholder="Enter OTP sent to your email" maxlength="6">
                </div>
                
                <div class="input-group">
                    <input type="email" id="email" class="input-field" placeholder="Email" required>
                    <input type="password" id="password" class="input-field" placeholder="Password" required>
                    <div id="errorMsg" class="error-msg"></div>
                    <div id="successMsg" class="success-msg"></div>
                </div>
                
                <hr class="divider">
                
                <div class="action-group">
                    <button type="submit" id="submitBtn" class="primary-btn">Create Account</button>
                    
                    <button type="button" class="google-btn">
                        <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google">
                        Continue with Google
                    </button>
                </div>
            </form>
        </div>

        <div class="social-proof">
            <p>Join <span class="highlight">thousands</span> of athletes already using SPORTX.</p>
            <div class="avatars">
                <img src="https://randomuser.me/api/portraits/men/32.jpg" alt="user">
                <!-- FIX #7: typo srcc → src -->
                <img src="https://randomuser.me/api/portraits/women/44.jpg" alt="user">
                <img src="https://randomuser.me/api/portraits/men/54.jpg" alt="user">
                <img src="https://randomuser.me/api/portraits/women/68.jpg" alt="user">
            </div>
        </div>
    </div>

    <script>
        let currentMode = 'signup';
        let otpSent = false;
        // FIX #8: Store pendingToken returned by /api/auth/register so verify-otp can send it back
        let pendingToken = null;

        // FIX #6: Accept event as parameter instead of relying on implicit global
        function switchTab(e, mode) {
            currentMode = mode;
            otpSent = false;
            pendingToken = null;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            e.target.classList.add('active');

            const submitBtn = document.getElementById('submitBtn');
            const otpGroup  = document.getElementById('otpGroup');
            otpGroup.style.display = 'none';

            submitBtn.textContent = mode === 'signup' ? 'Send OTP to Email' : 'Sign In';
            document.getElementById('errorMsg').textContent  = '';
            document.getElementById('successMsg').textContent = '';
        }

        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorMsg   = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            const submitBtn  = document.getElementById('submitBtn');

            errorMsg.textContent   = '';
            successMsg.textContent = '';
            submitBtn.disabled     = true;
            submitBtn.textContent  = 'Please wait…';

            try {
                if (currentMode === 'signin') {
                    const res  = await fetch('/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });
                    const data = await res.json();

                    if (data.success) {
                        // Persist session
                        localStorage.setItem('sportx_user',  email);
                        localStorage.setItem('sportx_token', data.token);
                        window.location.href = '/';
                    } else {
                        errorMsg.textContent = data.message;
                    }

                } else {
                    // ── SIGNUP FLOW ──
                    if (!otpSent) {
                        // Step 1: request OTP
                        const res  = await fetch('/api/auth/register', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ email, password, name: email.split('@')[0] })
                        });
                        const data = await res.json();

                        if (data.success) {
                            otpSent      = true;
                            // Save pendingToken so Vercel serverless can recover OTP
                            pendingToken = data.pendingToken || null;
                            document.getElementById('otpGroup').style.display = 'block';
                            submitBtn.textContent = 'Verify OTP & Register';
                            // If email provider not configured, server returns devOtp directly
                            if (data.devOtp) {
                                document.getElementById('otp').value = data.devOtp;
                                successMsg.innerHTML = `${data.message}<br><span style="color:#F5A623;font-weight:700;">⚠️ Dev mode: OTP auto-filled (${data.devOtp}). Set RESEND_API_KEY in Vercel to send real emails.</span>`;
                            } else {
                                successMsg.textContent = data.message;
                            }
                        } else {
                            errorMsg.textContent = data.message;
                        }

                    } else {
                        // Step 2: verify OTP
                        const otp = document.getElementById('otp').value.trim();
                        if (!otp) {
                            errorMsg.textContent = 'Please enter the OTP sent to your email.';
                            submitBtn.disabled = false;
                            submitBtn.textContent = 'Verify OTP & Register';
                            return;
                        }

                        const body = { email, otp };
                        // FIX #8: send pendingToken back so server can verify even without otpStore
                        if (pendingToken) body.pendingToken = pendingToken;

                        const res  = await fetch('/api/auth/verify-otp', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(body)
                        });
                        const data = await res.json();

                        if (data.success) {
                            localStorage.setItem('sportx_user',  email);
                            localStorage.setItem('sportx_token', data.token);
                            window.location.href = '/';
                        } else {
                            errorMsg.textContent = data.message;
                        }
                    }
                }
            } catch (err) {
                errorMsg.textContent = 'Network error. Please try again.';
            } finally {
                submitBtn.disabled = false;
                if (!otpSent && currentMode === 'signup') submitBtn.textContent = 'Send OTP to Email';
                else if (otpSent && currentMode === 'signup') submitBtn.textContent = 'Verify OTP & Register';
                else if (currentMode === 'signin') submitBtn.textContent = 'Sign In';
            }
        });
    </script>
</body>
</html>
